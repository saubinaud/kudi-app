<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="20" fill="#0A2F24"/>
  <!-- Vertical stem with diagonal cut at top -->
  <polygon points="22,15 34,15 34,85 22,85" fill="white"/>
  <!-- Diagonal cut through the stem -->
  <polygon points="22,15 34,15 34,25 22,35" fill="#0A2F24"/>
  <!-- Upper diagonal arm (going to top-right) -->
  <polygon points="30,42 38,32 68,15 75,15 42,45" fill="white"/>
  <!-- Lower diagonal arm (going to bottom-right) -->
  <polygon points="34,55 42,48 78,85 66,85" fill="white"/>
</svg>
